services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fenlu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-fenlu_v5}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-fenlu}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [fenlu]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
    networks: [fenlu]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-fenlu}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    networks: [fenlu]

  api-gateway:
    build:
      context: .
      dockerfile: apps/api_gateway/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fenlu}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fenlu_v5}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-fenlu}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [fenlu]

  migrate:
    build:
      context: .
      dockerfile: apps/api_gateway/Dockerfile
    user: root
    command: ["alembic", "-c", "infra/alembic.ini", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fenlu}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fenlu_v5}
    depends_on:
      postgres: { condition: service_healthy }
    networks: [fenlu]
    profiles: [migrate]

  web:
    build:
      context: apps/web-shell
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api-gateway
    networks: [fenlu]

volumes:
  pg_data:
  redis_data:
  minio_data:

networks:
  fenlu:
    driver: bridge
