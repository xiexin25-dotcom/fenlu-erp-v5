services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fenlu
      POSTGRES_PASSWORD: fenlu_dev
      POSTGRES_DB: fenlu_v5
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "fenlu"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fenlu
      MINIO_ROOT_PASSWORD: fenlu_dev_minio
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio_data:/data

  api-gateway:
    build:
      context: .
      dockerfile: apps/api_gateway/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://fenlu:fenlu_dev@postgres:5432/fenlu_v5
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    ports: ["8000:8000"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

volumes:
  pg_data:
  minio_data:
